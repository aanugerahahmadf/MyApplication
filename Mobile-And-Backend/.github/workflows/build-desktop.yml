name: Build — Desktop Platform (Windows / macOS)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target OS'
        required: true
        default: 'both'
        type: choice
        options: [windows, mac, both]

env:
  VITE_PLATFORM: desktop

jobs:
  # ── Shared: Run tests before building ──────────────────────────────────────
  test:
    name: Run Tests (Desktop Mode)
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_KEY: base64:TEST_KEY_32_BYTES_HERE_FOR_CI_USE=
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      VITE_PLATFORM: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, mbstring, openssl

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress

      - name: Copy environment file
        run: cp .env.example .env && php artisan key:generate

      - name: Run Pest tests
        run: php artisan test --parallel

  # ── Build desktop assets ───────────────────────────────────────────────────
  build-assets:
    name: Build Desktop Assets
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_PLATFORM: desktop

      - name: Verify build output
        run: |
          test -f public/build/desktop/manifest.json && echo "✅ Desktop manifest.json exists" || (echo "❌ Desktop manifest.json missing" && exit 1)

      - name: Upload desktop assets
        uses: actions/upload-artifact@v4
        with:
          name: desktop-assets
          path: public/build/desktop/
          retention-days: 7

  # ── Windows Build ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer (.exe)
    runs-on: windows-latest
    needs: build-assets
    if: >
      github.event.inputs.platform == 'windows' ||
      github.event.inputs.platform == 'both' ||
      github.event.inputs.platform == ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Download desktop assets
        uses: actions/download-artifact@v4
        with:
          name: desktop-assets
          path: public/build/desktop/

      - name: Create .env for desktop build
        shell: pwsh
        run: |
          Copy-Item .env.desktop.example .env.desktop -ErrorAction SilentlyContinue
          If (-Not (Test-Path ".env.desktop")) { Copy-Item .env.example .env.desktop }
          Add-Content .env.desktop "APP_KEY=${{ secrets.APP_KEY }}"
          Add-Content .env.desktop "NATIVEPHP_APP_ID=${{ secrets.NATIVEPHP_APP_ID }}"
          Add-Content .env.desktop "NATIVEPHP_APP_VERSION=${{ secrets.NATIVEPHP_APP_VERSION || '1.0.0' }}"

      - name: Write Windows code signing certificate
        shell: pwsh
        if: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}\windows-cert.pfx", $certBytes)

      - name: Build Windows installer
        run: php artisan native:build --os=win
        env:
          NATIVEPHP_WINDOWS_CERT_FILE: ${{ github.workspace }}\windows-cert.pfx
          NATIVEPHP_WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*-Setup-*.exe
            dist/*-win.zip
          retention-days: 14

  # ── macOS Build ───────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS App (.dmg)
    runs-on: macos-latest
    needs: build-assets
    if: >
      github.event.inputs.platform == 'mac' ||
      github.event.inputs.platform == 'both' ||
      github.event.inputs.platform == ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Download desktop assets
        uses: actions/download-artifact@v4
        with:
          name: desktop-assets
          path: public/build/desktop/

      - name: Import Apple Developer certificate
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temp-keychain-password' }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$P12_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Create .env for desktop build
        run: |
          cp .env.desktop.example .env.desktop 2>/dev/null || cp .env.example .env.desktop
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env.desktop
          echo "NATIVEPHP_APP_ID=${{ secrets.NATIVEPHP_APP_ID }}" >> .env.desktop
          echo "NATIVEPHP_APP_VERSION=${{ secrets.NATIVEPHP_APP_VERSION || '1.0.0' }}" >> .env.desktop

      - name: Build macOS .dmg
        run: php artisan native:build --os=mac
        env:
          NATIVEPHP_MACOS_IDENTITY: ${{ secrets.MACOS_IDENTITY }}
          NATIVEPHP_APPLE_ID: ${{ secrets.APPLE_ID }}
          NATIVEPHP_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NATIVEPHP_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS disk image
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            dist/*.dmg
            dist/*-mac.zip
          retention-days: 14
