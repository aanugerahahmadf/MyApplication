name: Build & Test — Web Platform

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests (Web Mode)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: wedding_organizer_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_KEY: base64:TEST_KEY_32_BYTES_HERE_FOR_CI_USE=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: wedding_organizer_test
      DB_USERNAME: root
      DB_PASSWORD: password
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, openssl, tokenizer, xml, ctype, json
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress

      - name: Copy test environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run Pest tests (Web mode)
        run: php artisan test --parallel
        env:
          VITE_PLATFORM: web

  build-assets:
    name: Build Web Assets
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build:web
        env:
          VITE_PLATFORM: web

      - name: Verify build output
        run: |
          test -f public/build/web/manifest.json && echo "✅ Web manifest.json exists" || (echo "❌ Web manifest.json missing" && exit 1)
          ls -la public/build/web/

      - name: Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: public/build/web/
          retention-days: 7

  deploy-web:
    name: Deploy to Production (Web)
    runs-on: ubuntu-latest
    needs: [test, build-assets]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: public/build/web/

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-progress

      # Replace the deploy step below with your actual deployment mechanism
      # (Envoyer, Deployer, rsync, Laravel Forge webhook, etc.)
      - name: Deploy to server
        run: |
          echo "Deploy to your server here."
          echo "Example: php artisan deploy (using Deployer or Envoyer webhook)"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
