steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-decorasi-api:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-decorasi-api:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'

  # 2. Push to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/wedding-decorasi-api:${SHORT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/wedding-decorasi-api:latest'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wedding-decorasi-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/wedding-decorasi-api:${SHORT_SHA}'
      - '--region'
      - 'asia-southeast2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'APP_ENV=production,APP_DEBUG=false,APP_URL=https://wedding-decorasi-flower.web.app,DB_CONNECTION=mysql,DB_HOST=${_DB_HOST},DB_PORT=${_DB_PORT},DB_DATABASE=${_DB_DATABASE},DB_USERNAME=${_DB_USERNAME},SESSION_DRIVER=database,CACHE_STORE=database,QUEUE_CONNECTION=database'

  # 4. Deploy Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: npx
    args:
      - '-y'
      - 'firebase-tools@latest'
      - 'deploy'
      - '--only'
      - 'hosting'
      - '--project'
      - '$PROJECT_ID'

substitutions:
  _DB_HOST: ''
  _DB_PORT: '3306'
  _DB_DATABASE: ''
  _DB_USERNAME: ''

options:
  logging: CLOUD_LOGGING_ONLY
